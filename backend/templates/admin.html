<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Admin — Customer Service Board</title>
<link rel="stylesheet" href="/static/css/archiva.css" />
<style>
  main {
    padding: 24px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .page-title {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 18px;
  }
  .page-title h1 {
    font-size: 22px;
    font-weight: 700;
    color: var(--archiva-primary);
    margin: 0;
  }
  .card {
    background: var(--archiva-white);
    border: 1px solid var(--archiva-grey-light);
    border-radius: 10px;
    overflow: hidden;
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 13px;
  }
  thead th {
    text-align: left;
    font-weight: 600;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--archiva-white);
    background: var(--archiva-navy);
    padding: 10px 12px;
  }
  tbody td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--archiva-grey-light);
    vertical-align: middle;
  }
  tbody tr:hover td { background: var(--archiva-bg-alt); }
  .ruolo-badge {
    display: inline-block;
    padding: 2px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
  }
  .ruolo-admin  { background: #FFE9CC; color: #8A4B00; }
  .ruolo-user   { background: #DCEEFD; color: #0A4A7A; }
  .ruolo-ospite { background: #E5E5E5; color: #555; }
  .actions { display: flex; gap: 6px; }
  .actions .btn { padding: 5px 10px; font-size: 12px; }

  /* Modale */
  .modal-bg {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.45);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 1000;
  }
  .modal-bg.open { display: flex; }
  .modal {
    background: var(--archiva-white);
    border-radius: 10px;
    padding: 22px 24px;
    width: 420px;
    max-width: calc(100vw - 32px);
    box-shadow: 0 12px 32px rgba(0,0,0,0.2);
  }
  .modal h2 {
    margin: 0 0 16px;
    font-size: 18px;
    color: var(--archiva-primary);
  }
  .modal label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    color: var(--archiva-grey-mid);
    text-transform: uppercase;
    letter-spacing: 0.4px;
    margin-bottom: 6px;
  }
  .modal input, .modal select {
    width: 100%;
    padding: 9px 11px;
    border: 1px solid var(--archiva-grey-light);
    border-radius: 6px;
    font-size: 14px;
    margin-bottom: 12px;
    font-family: inherit;
  }
  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 8px;
  }
  .err-modal {
    color: var(--archiva-red);
    font-size: 13px;
    background: #FBDDD9;
    padding: 8px 12px;
    border-radius: 6px;
    margin-bottom: 12px;
    display: none;
  }
  .err-modal.show { display: block; }
</style>
</head>
<body>

<header class="app-header">
  <div class="logo">
    <div class="logo-mark">A</div>
    <span>Archiva Group</span>
  </div>
  <div class="app-title">
    <strong>Pannello Amministrazione</strong>
    Gestione utenti — Customer Service Board
  </div>
  <div class="header-spacer"></div>
  <a href="/" class="btn btn-secondary" style="background:rgba(255,255,255,0.12);color:#fff;border-color:rgba(255,255,255,0.3)">← Torna alla board</a>
  <div class="user-chip" id="userChip"></div>
</header>

<main>
  <div class="page-title">
    <h1>Utenti</h1>
    <button class="btn btn-primary" id="btnNew">+ Nuovo utente</button>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>Username</th>
          <th>Nome</th>
          <th>Ruolo applicativo</th>
          <th>Titolo professionale</th>
          <th style="width:240px">Azioni</th>
        </tr>
      </thead>
      <tbody id="usersTbody">
        <tr><td colspan="5" style="text-align:center;color:var(--archiva-grey-mid);padding:24px">Caricamento…</td></tr>
      </tbody>
    </table>
  </div>
</main>

<!-- Modale crea/modifica -->
<div class="modal-bg" id="modalBg">
  <div class="modal">
    <h2 id="modalTitle">Nuovo utente</h2>
    <div class="err-modal" id="modalErr"></div>
    <form id="userForm">
      <label for="f-username">Username</label>
      <input type="text" id="f-username" required />

      <label for="f-nome">Nome completo</label>
      <input type="text" id="f-nome" required />

      <label for="f-ruolo">Ruolo applicativo</label>
      <select id="f-ruolo" required>
        <option value="user">Utente</option>
        <option value="admin">Amministratore</option>
        <option value="ospite">Ospite</option>
      </select>

      <label for="f-role">Titolo professionale</label>
      <input type="text" id="f-role" placeholder="es. Service Delivery Manager" />

      <label for="f-password">Password <span id="pwd-hint" style="text-transform:none;font-weight:400;color:var(--archiva-grey-mid)">(min 8 caratteri)</span></label>
      <input type="password" id="f-password" autocomplete="new-password" />

      <div class="modal-actions">
        <button type="button" class="btn btn-secondary" id="btnCancel">Annulla</button>
        <button type="submit" class="btn btn-primary" id="btnSave">Salva</button>
      </div>
    </form>
  </div>
</div>

<footer>
  <div>Customer Service Board v0.1 — Archiva Group</div>
</footer>

<script src="/static/js/auth.js"></script>
<script>
  let currentUser = null;
  let editingUsername = null;

  const tbody = document.getElementById("usersTbody");
  const modalBg = document.getElementById("modalBg");
  const modalTitle = document.getElementById("modalTitle");
  const modalErr = document.getElementById("modalErr");
  const form = document.getElementById("userForm");

  authInit({ requireAdmin: true }).then(user => {
    if (!user) return;
    currentUser = user;
    loadUsers();
  });

  async function loadUsers() {
    const r = await apiFetch("/api/admin/users");
    if (!r) return;
    const data = await r.json();
    if (!r.ok) { tbody.innerHTML = `<tr><td colspan="5" style="color:var(--archiva-red);padding:18px">${escapeHtml(data.detail || "Errore")}</td></tr>`; return; }
    if (!data.users.length) {
      tbody.innerHTML = `<tr><td colspan="5" style="text-align:center;color:var(--archiva-grey-mid);padding:24px">Nessun utente</td></tr>`;
      return;
    }
    tbody.innerHTML = data.users.map(u => `
      <tr>
        <td><code>${escapeHtml(u.username)}</code></td>
        <td>${escapeHtml(u.nome)}</td>
        <td><span class="ruolo-badge ruolo-${escapeHtml(u.ruolo)}">${ruoloLabel(u.ruolo)}</span></td>
        <td>${escapeHtml(u.role || "—")}</td>
        <td class="actions">
          <button class="btn btn-secondary" data-act="edit" data-username="${escapeHtml(u.username)}">Modifica</button>
          <button class="btn btn-danger" data-act="del" data-username="${escapeHtml(u.username)}" ${u.username === currentUser.username ? 'disabled title="Non puoi eliminare te stesso"' : ""}>Elimina</button>
        </td>
      </tr>
    `).join("");
    tbody.querySelectorAll('button[data-act="edit"]').forEach(b => b.addEventListener("click", () => openEdit(b.dataset.username)));
    tbody.querySelectorAll('button[data-act="del"]').forEach(b => b.addEventListener("click", () => deleteUser(b.dataset.username)));
  }

  function ruoloLabel(r) {
    return ({ admin: "Amministratore", user: "Utente", ospite: "Ospite" })[r] || r;
  }

  function openCreate() {
    editingUsername = null;
    modalTitle.textContent = "Nuovo utente";
    document.getElementById("f-username").disabled = false;
    document.getElementById("f-username").value = "";
    document.getElementById("f-nome").value = "";
    document.getElementById("f-ruolo").value = "user";
    document.getElementById("f-role").value = "";
    document.getElementById("f-password").value = "";
    document.getElementById("f-password").required = true;
    document.getElementById("pwd-hint").textContent = "(min 8 caratteri)";
    modalErr.classList.remove("show");
    modalBg.classList.add("open");
  }

  async function openEdit(username) {
    const r = await apiFetch("/api/admin/users");
    if (!r) return;
    const data = await r.json();
    const u = data.users.find(x => x.username === username);
    if (!u) return;
    editingUsername = username;
    modalTitle.textContent = "Modifica utente: " + username;
    document.getElementById("f-username").disabled = true;
    document.getElementById("f-username").value = u.username;
    document.getElementById("f-nome").value = u.nome;
    document.getElementById("f-ruolo").value = u.ruolo;
    document.getElementById("f-role").value = u.role || "";
    document.getElementById("f-password").value = "";
    document.getElementById("f-password").required = false;
    document.getElementById("pwd-hint").textContent = "(lascia vuoto per non modificare)";
    modalErr.classList.remove("show");
    modalBg.classList.add("open");
  }

  function closeModal() {
    modalBg.classList.remove("open");
  }

  document.getElementById("btnNew").addEventListener("click", openCreate);
  document.getElementById("btnCancel").addEventListener("click", closeModal);
  modalBg.addEventListener("click", (ev) => { if (ev.target === modalBg) closeModal(); });

  form.addEventListener("submit", async (ev) => {
    ev.preventDefault();
    modalErr.classList.remove("show");
    const payload = {
      nome: document.getElementById("f-nome").value.trim(),
      ruolo: document.getElementById("f-ruolo").value,
      role: document.getElementById("f-role").value.trim(),
    };
    const pwd = document.getElementById("f-password").value;
    if (pwd) payload.password = pwd;

    let r;
    if (editingUsername) {
      r = await apiFetch(`/api/admin/users/${encodeURIComponent(editingUsername)}`, {
        method: "PUT",
        body: JSON.stringify(payload)
      });
    } else {
      payload.username = document.getElementById("f-username").value.trim().toLowerCase();
      payload.password = pwd;
      r = await apiFetch("/api/admin/users", {
        method: "POST",
        body: JSON.stringify(payload)
      });
    }
    if (!r) return;
    const data = await r.json();
    if (!r.ok) {
      modalErr.textContent = data.detail || "Errore";
      modalErr.classList.add("show");
      return;
    }
    closeModal();
    loadUsers();
  });

  async function deleteUser(username) {
    if (!confirm(`Eliminare l'utente "${username}"?`)) return;
    const r = await apiFetch(`/api/admin/users/${encodeURIComponent(username)}`, { method: "DELETE" });
    if (!r) return;
    const data = await r.json();
    if (!r.ok) { alert(data.detail || "Errore"); return; }
    loadUsers();
  }
</script>
</body>
</html>
